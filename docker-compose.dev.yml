version: '3.8'

services:
  file-manager-dev:
    container_name: marufiles_app_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VITE_MINIO_ENDPOINT: ${VITE_MINIO_ENDPOINT}
        VITE_MINIO_ACCESS_KEY: ${VITE_MINIO_ACCESS_KEY}
        VITE_MINIO_SECRET_KEY: ${VITE_MINIO_SECRET_KEY}
        VITE_MINIO_BUCKET_NAME: ${VITE_MINIO_BUCKET_NAME}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
